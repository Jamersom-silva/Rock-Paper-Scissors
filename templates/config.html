<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Game - Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        .config-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        h1 {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .rounds-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .round-btn {
            padding: 15px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
        }

        .round-btn:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .round-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
        }

        .custom-section {
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .custom-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .custom-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .btn-start {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: #999;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="config-card">
            <h1>🎯 CONFIGURE YOUR GAME</h1>
            <p class="subtitle">How many rounds do you want to play?</p>
            
            <form action="{{ url_for('start_game') }}" method="POST" id="config-form">
                <div class="rounds-options">
                    <button type="button" class="round-btn" data-option="1">
                        🏆 Best of 3 (First to 2 wins)
                    </button>
                    <button type="button" class="round-btn" data-option="2">
                        🏆 Best of 5 (First to 3 wins)
                    </button>
                    <button type="button" class="round-btn" data-option="3">
                        🏆 Best of 7 (First to 4 wins)
                    </button>
                    <button type="button" class="round-btn" data-option="4">
                        🎲 Custom number of rounds
                    </button>
                </div>
                
                <div class="custom-section" id="custom-section" style="display: none;">
                    <label>Enter number of rounds (1-20):</label>
                    <input type="number" name="custom_rounds" id="custom_rounds" min="1" max="20" value="3">
                </div>
                
                <input type="hidden" name="option" id="selected_option" value="">
                
                <button type="submit" class="btn-start">🚀 START GAME</button>
            </form>
            
            <a href="{{ url_for('index') }}" class="btn-back">← Back to Menu</a>
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.round-btn');
        const customSection = document.getElementById('custom-section');
        const selectedOption = document.getElementById('selected_option');
        
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove selected class from all
                buttons.forEach(b => b.classList.remove('selected'));
                // Add selected class to clicked
                btn.classList.add('selected');
                
                const option = btn.dataset.option;
                selectedOption.value = option;
                
                // Show/hide custom section
                if (option === '4') {
                    customSection.style.display = 'block';
                } else {
                    customSection.style.display = 'none';
                }
            });
        });
        
        // Select first option by default
        buttons[0].click();
    </script>
</body>
</html>
