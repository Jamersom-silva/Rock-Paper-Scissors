<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            padding: 40px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .rules {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .rules h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .rule {
            display: inline-block;
            margin: 5px 10px;
            padding: 8px 15px;
            background: white;
            border-radius: 20px;
            font-size: 0.9em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-card">
            <h1>🎮 ROCK PAPER SCISSORS 🎮</h1>
            <p class="subtitle">Classic game of strategy and luck!</p>
            
            <div class="menu-buttons">
                <a href="{{ url_for('config') }}" class="btn btn-primary">▶ START GAME</a>
            </div>
            
            <div class="rules">
                <h3>📖 How to Play</h3>
                <div class="rule">🪨 Rock crushes ✂️ Scissors</div>
                <div class="rule">✂️ Scissors cut 📄 Paper</div>
                <div class="rule">📄 Paper covers 🪨 Rock</div>
            </div>
        </div>
    </div>
</body>
</html>
