<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .round-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .round-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
        }

        .score-board {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 20px;
        }

        .score {
            text-align: center;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
        }

        .score-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .vs {
            font-size: 1.5em;
            font-weight: bold;
            color: #999;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .choice-btn {
            padding: 30px;
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .choice-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .choice-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .choice-text {
            font-weight: bold;
            color: #333;
        }

        .message-area {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            min-height: 100px;
        }

        .loading {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #999;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-card">
            <div class="round-info">
                <span class="round-badge">ROUND {{ round_num }} of {{ total_rounds }}</span>
            </div>
            
            <div class="score-board">
                <div class="score">
                    <div class="score-label">🧑 YOU</div>
                    <div class="score-value">{{ score.player }}</div>
                </div>
                <div class="vs">VS</div>
                <div class="score">
                    <div class="score-label">🤖 COMPUTER</div>
                    <div class="score-value">{{ score.computer }}</div>
                </div>
            </div>
            
            <div class="choices">
                <button class="choice-btn" data-move="1">
                    <div class="choice-icon">🪨</div>
                    <div class="choice-text">ROCK</div>
                </button>
                <button class="choice-btn" data-move="2">
                    <div class="choice-icon">✂️</div>
                    <div class="choice-text">SCISSORS</div>
                </button>
                <button class="choice-btn" data-move="3">
                    <div class="choice-icon">📄</div>
                    <div class="choice-text">PAPER</div>
                </button>
            </div>
            
            <div class="message-area" id="message-area">
                <p>Choose your move above!</p>
            </div>
            
            <form action="{{ url_for('play') }}" method="POST" id="game-form">
                <input type="hidden" name="move" id="move-input">
            </form>
            
            <a href="{{ url_for('reset') }}" class="btn-reset">🔄 New Game</a>
        </div>
    </div>

    <script>
        const btns = document.querySelectorAll('.choice-btn');
        const form = document.getElementById('game-form');
        const moveInput = document.getElementById('move-input');
        const messageArea = document.getElementById('message-area');
        
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const move = btn.dataset.move;
                moveInput.value = move;
                
                messageArea.innerHTML = '<div class="loading">🤔 Computer is thinking...</div>';
                
                setTimeout(() => {
                    form.submit();
                }, 300);
            });
        });
    </script>
</body>
</html>
